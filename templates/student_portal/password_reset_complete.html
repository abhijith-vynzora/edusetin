{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | EdusetIn</title>
    <!-- Use existing Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'admin-static/assets/css/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-title {
            margin-bottom: 1rem;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="text-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#198754" class="bi bi-check-circle" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
        </svg>
    </div>
    <h3 class="form-title">Password Reset Complete</h3>
    
    <div class="text-center text-muted mt-3">
        <p>Your password has been set successfully. You may go ahead and log in now.</p>
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'student_portal:login' %}" class="btn btn-primary">Log in to Dashboard</a>
    </div>
</div>

<script src="{% static 'admin-static/assets/js/bootstrap.min.js' %}"></script>
</body>
</html>
