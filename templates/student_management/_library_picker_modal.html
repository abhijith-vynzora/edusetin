{# Shared Library Picker Modal — include once per page #}
<div class="modal fade" id="libraryPickerModal" tabindex="-1" aria-labelledby="libraryPickerLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="libraryPickerLabel">
                    <i class="fas fa-folder-open me-2 text-primary"></i> Select from Media Library
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Search -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="pickerSearchInput" class="form-control"
                               placeholder="Search by name or description...">
                    </div>
                    <div class="text-muted small mt-1">Searching name and description. Partial matches supported.</div>
                </div>
                <!-- Grid -->
                <div id="pickerGrid" class="picker-grid">
                    <div class="text-center text-muted py-4" style="grid-column:1/-1;">
                        <i class="fas fa-spinner fa-spin"></i> Loading...
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
